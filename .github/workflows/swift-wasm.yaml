# Build Swift for WASM to verify the WebGPU WASM backend compiles.

name: Build (WASM)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Read Swift version
        id: swift-version
        run: echo "version=$(cat .swift-version)" >> "$GITHUB_OUTPUT"

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "${{ steps.swift-version.outputs.version }}"
          skip-verify-signature: true

      - name: Read WASM SDK version
        id: wasm-sdk-version
        run: echo "tag=$(grep '^CI=' .wasm-sdk-versions | cut -d'=' -f2 | sed 's/_wasm$//')" >> "$GITHUB_OUTPUT"

      - uses: swiftwasm/setup-swiftwasm@v2
        with:
          tag: "${{ steps.wasm-sdk-version.outputs.tag }}"

      - name: Build WebGPU
        run: make wasm-build

      - name: Build BitonicSort
        run: make wasm-build-bitonic
