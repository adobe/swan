name: Build Dawn WebGPU

on:
  workflow_call:
    inputs:
      chromium_version:
        required: true
        description: "Chromium version this version of Dawn matches"
        type: string
      config:
        description: "Configuration (release or debug)"
        required: true
        type: string
      dawn_hash:
        description: "Git hash of Dawn code"
        required: true
        type: string
      bundle_name:
        description: "Name of the archive bundle"
        required: true
        type: string
      suffix:
        description: "Optional suffix to append to archive names"
        required: false
        default: ""
        type: string
      vs_bootstrapper_url:
        description: "URL to a Visual Studio bootstrapper exe to install a specific VS version (leave empty to use the runner default)"
        required: false
        default: ""
        type: string
    outputs:
      artifact_id:
        description: "Artifact ID of the archive bundle"
        value: ${{ jobs.create-bundle.outputs.artifact_id }}

jobs:
  build-dawn:
    strategy:
      matrix:
        include:
          - platform: ubuntu-latest
            target: linux
            arch: x86_64
            python-version: "3.11"
          - platform: ubuntu-22.04-arm
            target: linux
            arch: arm64
            python-version: "3.11"
          - platform: macos-latest
            target: macosx
            arch: universal
            python-version: "3.11"
          - platform: windows-latest
            target: windows
            arch: x86_64
            python-version: "3.11"
          - platform: windows-11-arm
            target: windows
            arch: arm64
            python-version: "3.11"
          - platform: macos-latest
            target: iphoneos
            arch: arm64
            python-version: "3.11"
          - platform: macos-latest
            target: iphonesimulator
            arch: x86_64
            python-version: "3.11"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install prerequisites on Linux
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake curl git gnupg2 libcurl4-openssl-dev libpython3-dev libssl-dev libx11-xcb-dev libxcursor-dev libxi-dev libxinerama-dev libxml2-dev libxrandr-dev libz-dev libz3-dev mesa-common-dev ninja-build pkg-config python3 python3-pip python3-venv tzdata unzip wget

      - name: Install Visual Studio from bootstrapper
        if: startsWith(matrix.platform, 'windows') && inputs.vs_bootstrapper_url != ''
        shell: pwsh
        run: |
          $bootstrapper = "$env:TEMP\vs_enterprise.exe"
          Write-Host "Downloading bootstrapper from ${{ inputs.vs_bootstrapper_url }}"
          Invoke-WebRequest -Uri "${{ inputs.vs_bootstrapper_url }}" -OutFile $bootstrapper

          $installPath = "C:\VS"
          $installArgs = "--quiet --wait --norestart --includeRecommended --installPath `"$installPath`" --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.Component.MSBuild"
          Write-Host "Running: $bootstrapper $installArgs"
          $proc = Start-Process -FilePath $bootstrapper -ArgumentList $installArgs -Wait -NoNewWindow -PassThru

          Write-Host "Installer exit code: $($proc.ExitCode)"

          if ($proc.ExitCode -notin 0, 3010) {
            Get-ChildItem "$env:TEMP\dd_*.log" -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 3 |
              ForEach-Object {
                Write-Host "=== $($_.Name) ==="
                Get-Content $_.FullName -Tail 50
              }
            throw "VS install failed with exit code $($proc.ExitCode)"
          }

          # Verify the install via vswhere and set CMAKE_GENERATOR_INSTANCE to the path.
          # The ",version=<version>" form is only needed when multiple VS installs share
          # the same path; for a single side-by-side install the path alone is correct.
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInfo = & $vswhere -path $installPath -format json | ConvertFrom-Json
          $vsVersion = $vsInfo[0].installationVersion
          Write-Host "VS $vsVersion installed at $installPath"
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_INSTANCE=$installPath" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd Dawn
          pip install -r requirements.txt

      - name: Download Dawn source
        run: |
          cd Dawn
          python ci_build_dawn.py get-source --hash ${{ inputs.dawn_hash }}

      - name: Build Dawn for ${{ matrix.target }} (${{ matrix.arch }})
        run: |
          cd Dawn
          python ci_build_dawn.py build-target --target ${{ matrix.target }} --arch ${{ matrix.arch }} --config ${{ inputs.config }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dawn-build-${{ matrix.target }}-${{ matrix.arch }}-${{ inputs.config }}
          path: |
            Dawn/builds/
            !Dawn/builds/*/out
          retention-days: 1

      - name: Upload dawn.json
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: dawn-json
          path: Dawn/dawn_source/src/dawn/dawn.json
          overwrite: true
          retention-days: 1

  create-bundle:
    needs: [build-dawn]
    runs-on: ubuntu-latest
    outputs:
      bundle_name: ${{ inputs.bundle_name }}
      artifact_id: ${{ steps.store-artifact-bundle.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd Dawn
          pip install -r requirements.txt

      - name: Download dawn.json
        uses: actions/download-artifact@v8
        with:
          name: dawn-json
          path: Dawn/dawn_source/src/dawn

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dawn-build-*-*-${{ inputs.config }}
          path: Dawn/builds/
          merge-multiple: true

      - name: Create artifact bundle
        run: |
          cd Dawn
          python ci_build_dawn.py bundle --chromium-version ${{ inputs.chromium_version }} --dawn-hash ${{ inputs.dawn_hash }} --bundle-name ${{ inputs.bundle_name }}${{ inputs.suffix && format(' --suffix {0}', inputs.suffix) || '' }}

      - name: Store artifact bundle
        id: store-artifact-bundle
        uses: actions/upload-artifact@v7
        with:
          name: dawn-bundle-${{ inputs.config }}
          path: Dawn/dist/
          retention-days: 1
